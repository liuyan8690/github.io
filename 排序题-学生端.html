<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>pH计操作排序挑战赛 · 每人一次</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0a2f6c 0%, #0a1e3e 100%);
            font-family: 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .game-container, .result-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 20px 18px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,200,255,0.4);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: white;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .sub {
            text-align: center;
            color: #b8e1ff;
            font-size: 0.75rem;
            margin-bottom: 16px;
        }
        .student-bar {
            background: rgba(0,40,65,0.75);
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .student-bar label {
            color: white;
            font-weight: 500;
        }
        .student-bar input {
            flex: 2;
            min-width: 150px;
            padding: 8px 16px;
            border-radius: 60px;
            border: none;
            outline: none;
            font-size: 0.9rem;
        }
        .btn {
            background: linear-gradient(95deg, #0b5e7c, #0a4b73);
            border: none;
            border-radius: 60px;
            padding: 10px 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .btn:active { transform: scale(0.96); }
        .drag-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: rgba(12,35,55,0.85);
            border-radius: 32px;
            padding: 16px 12px;
            border: 1px solid #2d8fcf;
        }
        .panel-title {
            font-size: 1rem;
            font-weight: bold;
            color: #7ad0ff;
            margin-bottom: 12px;
            text-align: center;
        }
        /* 固定的提示条，不参与拖拽，始终显示 */
        .fixed-hint {
            background: rgba(0,0,0,0.4);
            color: #ffde9c;
            font-size: 0.75rem;
            text-align: center;
            padding: 8px;
            border-radius: 30px;
            margin-bottom: 12px;
            backdrop-filter: blur(4px);
        }
        .cards-list {
            min-height: 280px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .step-card {
            background: #eef5ff;
            border-left: 6px solid #0a7bff;
            border-radius: 18px;
            padding: 12px 14px;
            font-weight: 500;
            cursor: grab;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .empty-hint {
            text-align: center;
            color: #8ab3cf;
            padding: 28px;
            font-size: 0.85rem;
        }
        .rank-card {
            background: rgba(2,20,35,0.85);
            border-radius: 32px;
            padding: 16px;
            margin-top: 20px;
            color: white;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .rank-table th, .rank-table td {
            border-bottom: 1px solid #2e6f94;
            padding: 8px 4px;
            text-align: left;
        }
        .result-summary {
            background: rgba(0,0,0,0.6);
            border-radius: 28px;
            padding: 14px;
            margin: 16px 0;
        }
        .btn-reset {
            background: #ffb347;
            color: #1f3a5f;
            margin-top: 20px;
            width: 100%;
        }
        footer {
            text-align: center;
            color: #b8d0f0;
            font-size: 0.65rem;
            margin-top: 20px;
        }
        @media (min-width: 700px) {
            .drag-area { flex-direction: row; }
            .panel { flex: 1; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ---------- 正确顺序 (10步骤) ----------
    const CORRECT_STEPS = [
        "准备与组装pH计", "电极活化与清洗", "取标准缓冲液", "pH计校准（两点校准）",
        "检查/调节温度补偿", "校准后验证电极斜率/响应", "测量水样前润洗电极",
        "插入水样测量", "读取稳定pH值并记录", "清洗电极并妥善保存"
    ];

    // ---------- QuickForm 配置 ----------
    const API_URL = "https://quickform.cn/api/8n7885e4tv";
    const GET_ALL_URL = "https://quickform.cn/api/8n7885e4tv/all";

    // ---------- 全局存储 ----------
    let currentStudent = "";
    const STORAGE_SUBMITTED_KEY = "ph_submitted_flag";

    // ---------- 渲染游戏界面 ----------
    function renderGame() {
        const html = `
            <div class="game-container">
                <h1>🧪 pH计操作步骤挑战赛</h1>
                <div class="sub">🔬 每人仅有一次提交机会 · 认真排序</div>
                <div class="student-bar">
                    <label>👤 你的姓名/学号：</label>
                    <input type="text" id="studentNameInput" placeholder="例: 张三 / 2024001" autocomplete="off">
                    <button id="startGameBtn" class="btn">开始挑战 ✅</button>
                </div>
                <div id="gamePanel" style="display: none;">
                    <div class="drag-area">
                        <!-- 左侧面板 -->
                        <div class="panel">
                            <div class="panel-title">📦 待排序卡片</div>
                            <div class="cards-list" id="leftList"></div>
                        </div>
                        <!-- 右侧面板：固定提示 + 拖拽区 -->
                        <div class="panel">
                            <div class="panel-title">🎯 正确操作顺序（从上到下）</div>
                            <div class="fixed-hint">✨ 将左侧步骤拖拽至此并按正确顺序排序</div>
                            <div class="cards-list" id="rightList">
                                <div class="empty-hint">暂无卡片，请从左侧拖入</div>
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 15px; margin-top: 10px;">
                        <button id="submitGameBtn" class="btn">📌 提交成绩（仅一次）</button>
                        <button id="resetOrderBtn" class="btn" style="background:#4a627a;">🔄 重置排序</button>
                    </div>
                </div>
                <div id="rankContainer" class="rank-card" style="margin-top: 24px;">
                    <h3 style="margin-bottom: 12px;">🏆 全班积分榜（实时更新）</h3>
                    <div id="rankList">加载中...</div>
                </div>
                <footer>每人仅有一次提交机会，认真排序再提交。提交后可查看成绩与全班排名。</footer>
            </div>
        `;
        document.getElementById('appRoot').innerHTML = html;
        attachGameEvents();
        loadAndShowRank();
    }

    // ---------- 加载全班排名 ----------
    async function loadAndShowRank() {
        const rankDiv = document.getElementById('rankList');
        if (!rankDiv) return;
        try {
            const response = await fetch(GET_ALL_URL);
            const data = await response.json();
            let submissions = data.submissions || [];
            if (submissions.length === 0) {
                rankDiv.innerHTML = "<div style='text-align:center'>暂无同学提交，快来做第一个挑战者！</div>";
                return;
            }
            const students = [];
            submissions.forEach(item => {
                let raw = item.data || {};
                let name = raw.studentName || "未知";
                let score = parseInt(raw.score) || 0;
                students.push({ name, score });
            });
            // 去重取最高分用于排名
            const uniqueMap = new Map();
            students.forEach(s => {
                if (!uniqueMap.has(s.name) || uniqueMap.get(s.name).score < s.score) {
                    uniqueMap.set(s.name, { name: s.name, score: s.score });
                }
            });
            const uniqueList = Array.from(uniqueMap.values()).sort((a,b) => b.score - a.score);
            let rankHtml = `<table class="rank-table"><thead><tr><th>排名</th><th>学生</th><th>得分(满分10)</th></tr></thead><tbody>`;
            uniqueList.forEach((stu, idx) => {
                rankHtml += `<tr><td>${idx+1}</td><td>${escapeHtml(stu.name)}</td><td>${stu.score}</td></tr>`;
            });
            rankHtml += `</tbody></table><div style="margin-top:12px; font-size:0.75rem;">✅ 已提交人数：${uniqueList.length}</div>`;
            rankDiv.innerHTML = rankHtml;
        } catch(e) {
            console.warn("获取排名失败", e);
            rankDiv.innerHTML = "<div>暂时无法加载排名，请稍后刷新页面。</div>";
        }
    }

    // ---------- 评分及详情 ----------
    function calculateScoreAndDetails(studentOrder) {
        let score = 0;
        const details = [];
        for (let i = 0; i < CORRECT_STEPS.length; i++) {
            const userStep = studentOrder[i] || "";
            const isCorrect = (userStep === CORRECT_STEPS[i]);
            if (isCorrect) score++;
            details.push({
                stepIndex: i+1,
                correctStep: CORRECT_STEPS[i],
                userStep: userStep || "(未填写)",
                isCorrect: isCorrect
            });
        }
        return { score, details, total: CORRECT_STEPS.length };
    }

    function generateEncouragement(score, total) {
        if (score === total) return "🎉 太厉害了！全部正确，规范操作已经刻进DNA，继续向着质检专家前进！";
        if (score >= 8) return "🌟 表现优异！大部分步骤都正确，再对照一下标准顺序，你离满分只差一步之遥～";
        if (score >= 5) return "📚 不错哦！基础顺序已经掌握，请仔细检查易混淆的几步（如温度补偿与润洗的先后），你会更强！";
        return "💪 别气馁！排序游戏是熟悉流程的最好方法，多练习几次，你一定可以成为pH操作高手！老师相信你。";
    }

    function showResultPage(studentName, score, details, total) {
        let detailsHtml = "";
        details.forEach(d => {
            detailsHtml += `<tr style="border-bottom:1px solid #3b6e8f;">
                                <td style="padding:6px;">${d.stepIndex}</td>
                                <td style="padding:6px;">${escapeHtml(d.correctStep)}</td>
                                <td style="padding:6px;">${escapeHtml(d.userStep)}</td>
                                <td style="padding:6px;">${d.isCorrect ? "✅" : "❌"}</td>
                            </tr>`;
        });
        const encouragement = generateEncouragement(score, total);
        const resultHtml = `
            <div class="result-container">
                <h1>🧪 挑战结果</h1>
                <div class="sub">${escapeHtml(studentName)}，你的pH操作排序成绩单</div>
                <div class="result-summary">
                    <div style="font-size:1.8rem; font-weight:bold;">${score} / ${total}</div>
                    <div>🎯 得分率 ${Math.round(score/total*100)}%</div>
                </div>
                <div style="background:#0a2e46; border-radius:28px; padding:12px; margin-bottom:16px;">
                    <div style="font-weight:bold;">📖 详细对比：</div>
                    <table style="width:100%; font-size:0.75rem; margin-top:8px;">
                        <thead><tr><th>步骤</th><th>✅ 正确操作</th><th>📌 你的顺序</th><th>匹配</th></tr></thead>
                        <tbody>${detailsHtml}</tbody>
                    </table>
                </div>
                <div style="background:#0f2c44; border-radius:28px; padding:16px;">
                    <div>💬 学习建议</div>
                    <div style="margin-top:8px; line-height:1.4;">${encouragement}</div>
                </div>
                <button id="restartHomeBtn" class="btn btn-reset">🏠 返回首页</button>
                <footer style="margin-top:20px;">你的成绩已同步至教师后台，全班排名已更新。</footer>
            </div>
        `;
        document.getElementById('appRoot').innerHTML = resultHtml;
        document.getElementById('restartHomeBtn').addEventListener('click', () => {
            window.location.reload();
        });
    }

    // ---------- 提交到QuickForm ----------
    async function submitScoreToQuickForm(studentName, score, details, total) {
        const payload = {
            studentName: studentName,
            score: score,
            total: total,
            details: details,
            submitTime: new Date().toISOString()
        };
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error("提交失败");
        return await response.json();
    }

    // ---------- 拖拽游戏逻辑（固定提示不参与拖拽）----------
    let leftSortable, rightSortable;
    function initSortable() {
        const leftDiv = document.getElementById('leftList');
        const rightDiv = document.getElementById('rightList');
        if (!leftDiv || !rightDiv) return;
        const groupConfig = { name: 'phGroup', pull: true, revertClone: false, sort: true };
        leftSortable = new Sortable(leftDiv, { group: groupConfig, animation: 200 });
        rightSortable = new Sortable(rightDiv, { group: groupConfig, animation: 200 });
    }

    function resetSortingGame() {
        const leftDiv = document.getElementById('leftList');
        const rightDiv = document.getElementById('rightList');
        if (!leftDiv || !rightDiv) return;
        if (leftSortable) leftSortable.destroy();
        if (rightSortable) rightSortable.destroy();
        // 打乱左侧步骤
        const shuffled = [...CORRECT_STEPS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        leftDiv.innerHTML = "";
        shuffled.forEach(step => {
            const card = document.createElement('div');
            card.className = 'step-card';
            card.textContent = step;
            leftDiv.appendChild(card);
        });
        // 清空右侧，只显示空提示（empty-hint），但固定提示条（.fixed-hint）不受影响
        rightDiv.innerHTML = '<div class="empty-hint">暂无卡片，请从左侧拖入</div>';
        initSortable();
    }

    function getCurrentOrder() {
        const rightCards = document.querySelectorAll('#rightList .step-card');
        return Array.from(rightCards).map(card => card.textContent);
    }

    function attachGameEvents() {
        const studentInput = document.getElementById('studentNameInput');
        const startBtn = document.getElementById('startGameBtn');
        const gamePanel = document.getElementById('gamePanel');
        startBtn.addEventListener('click', () => {
            const name = studentInput.value.trim();
            if (name === "") {
                alert("请填写你的姓名或学号");
                return;
            }
            currentStudent = name;
            const submittedFlag = localStorage.getItem(`${STORAGE_SUBMITTED_KEY}_${currentStudent}`);
            if (submittedFlag === "true") {
                alert(`⚠️ ${currentStudent}，你已完成本次挑战，每人仅可提交一次。\n可以查看排行榜，但不能重复提交。`);
                return;
            }
            gamePanel.style.display = "block";
            resetSortingGame();
        });
        const submitBtn = document.getElementById('submitGameBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', async () => {
                if (!currentStudent) {
                    alert("请先在上方填写姓名并点击「开始挑战」");
                    return;
                }
                const order = getCurrentOrder();
                if (order.length !== CORRECT_STEPS.length) {
                    alert(`请将全部 ${CORRECT_STEPS.length} 个步骤拖拽到右侧并排序后再提交`);
                    return;
                }
                const { score, details, total } = calculateScoreAndDetails(order);
                const flagKey = `${STORAGE_SUBMITTED_KEY}_${currentStudent}`;
                if (localStorage.getItem(flagKey) === "true") {
                    alert("每人仅可提交一次，你的记录已存在。");
                    return;
                }
                try {
                    await submitScoreToQuickForm(currentStudent, score, details, total);
                    localStorage.setItem(flagKey, "true");
                    showResultPage(currentStudent, score, details, total);
                    await loadAndShowRank();
                } catch (err) {
                    alert("提交失败，请检查网络或稍后重试。");
                    console.error(err);
                }
            });
        }
        const resetOrder = document.getElementById('resetOrderBtn');
        if (resetOrder) resetOrder.addEventListener('click', resetSortingGame);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    renderGame();
</script>
</body>
</html>
